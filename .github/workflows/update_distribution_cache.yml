name: Update Distribution Cache

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 2 * *"

permissions:
  contents: write

jobs:
  update-distribution-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build distribution cache
        env:
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          DISTRIBUTION_TARGET_FY: "2025"
          SEC_REQUEST_SLEEP_SECONDS: "0.12"
        run: python build_distribution_cache.py

      - name: Commit updated distribution cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add distribution_cache.csv.gz
          git diff --cached --quiet && exit 0
          git commit -m "Update distribution cache"
          git push

